<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6e8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Browser window frame -->
  <rect x="10" y="20" width="180" height="160" rx="14" ry="14"
        fill="url(#browserGrad)" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="10" y="20" width="180" height="36" rx="14" ry="14" fill="#152d4a"/>
  <rect x="10" y="38" width="180" height="18" fill="#152d4a"/>

  <!-- Traffic-light dots -->
  <circle cx="34" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="54" cy="38" r="6" fill="#febc2e"/>
  <circle cx="74" cy="38" r="6" fill="#28c840"/>

  <!-- URL bar -->
  <rect x="90" y="29" width="90" height="18" rx="9" ry="9" fill="#1e3a5f" opacity="0.7"/>
  <text x="135" y="42" font-family="monospace" font-size="9" fill="#8ab4d4" text-anchor="middle">agenticbrowser</text>

  <!-- Page content area -->
  <rect x="20" y="64" width="160" height="106" rx="6" ry="6" fill="#0a1e35"/>

  <!-- Robot/agent head -->
  <rect x="68" y="75" width="64" height="54" rx="12" ry="12" fill="url(#agentGrad)"/>

  <!-- Robot eyes -->
  <rect x="78" y="88" width="16" height="14" rx="4" ry="4" fill="#0a1e35"/>
  <rect x="106" y="88" width="16" height="14" rx="4" ry="4" fill="#0a1e35"/>
  <!-- Eye glow -->
  <circle cx="86" cy="95" r="4" fill="#00d4ff" opacity="0.9"/>
  <circle cx="114" cy="95" r="4" fill="#00d4ff" opacity="0.9"/>

  <!-- Robot mouth -->
  <rect x="80" y="110" width="40" height="8" rx="4" ry="4" fill="#0a1e35"/>
  <!-- Mouth teeth / circuit lines -->
  <rect x="87" y="110" width="2" height="8" fill="#00d4ff" opacity="0.6"/>
  <rect x="95" y="110" width="2" height="8" fill="#00d4ff" opacity="0.6"/>
  <rect x="103" y="110" width="2" height="8" fill="#00d4ff" opacity="0.6"/>
  <rect x="111" y="110" width="2" height="8" fill="#00d4ff" opacity="0.6"/>

  <!-- Robot antenna -->
  <line x1="100" y1="75" x2="100" y2="62" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="58" r="5" fill="#00d4ff"/>
  <circle cx="100" cy="58" r="3" fill="#fff" opacity="0.8"/>

  <!-- Circuit lines below robot -->
  <line x1="40" y1="145" x2="68" y2="145" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="40" y1="145" x2="40" y2="158" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="40" cy="158" r="3" fill="#00d4ff" opacity="0.5"/>

  <line x1="160" y1="145" x2="132" y2="145" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="160" y1="145" x2="160" y2="158" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <circle cx="160" cy="158" r="3" fill="#00d4ff" opacity="0.5"/>

  <line x1="68" y1="129" x2="45" y2="129" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <line x1="132" y1="129" x2="155" y2="129" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
  <circle cx="45" cy="129" r="2.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="155" cy="129" r="2.5" fill="#00d4ff" opacity="0.4"/>
</svg>
