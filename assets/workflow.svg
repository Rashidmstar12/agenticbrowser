<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e"/>
      <stop offset="100%" style="stop-color:#0d2440"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00d4ff"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#28c840"/>
    </marker>
    <marker id="arrY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#febc2e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="200" rx="14" fill="url(#bg2)"/>

  <!-- Step 1: Intent -->
  <rect x="14" y="74" width="110" height="52" rx="10" fill="#1a2d4a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="69" y="96"  font-size="11" fill="#fff"     text-anchor="middle" font-weight="600">Intent</text>
  <text x="69" y="113" font-size="9"  fill="#80b8d8"  text-anchor="middle">"go to google</text>
  <text x="69" y="124" font-size="9"  fill="#80b8d8"  text-anchor="middle">and search X"</text>
  <!-- Arrow 1→2 -->
  <line x1="124" y1="100" x2="164" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Template match? -->
  <!-- Diamond shape -->
  <polygon points="214,74 264,100 214,126 164,100" fill="#2d1a4a" stroke="#c8a8ff" stroke-width="1.5"/>
  <text x="214" y="97"  font-size="9" fill="#fff"     text-anchor="middle" font-weight="600">Template</text>
  <text x="214" y="108" font-size="9" fill="#fff"     text-anchor="middle">match?</text>

  <!-- YES path (top) -->
  <text x="303" y="70" font-size="9" fill="#28c840" text-anchor="middle">YES</text>
  <line x1="264" y1="100" x2="310" y2="100" stroke="#28c840" stroke-width="1.5"/>
  <line x1="310" y1="100" x2="310" y2="50"  stroke="#28c840" stroke-width="1.5"/>
  <line x1="310" y1="50"  x2="380" y2="50"  stroke="#28c840" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Hardcoded steps box -->
  <rect x="380" y="28" width="120" height="44" rx="9" fill="#0a2a1a" stroke="#28c840" stroke-width="1.5"/>
  <text x="440" y="46"  font-size="10" fill="#28c840" text-anchor="middle" font-weight="600">Hardcoded</text>
  <text x="440" y="62"  font-size="9"  fill="#4aaa6a" text-anchor="middle">0 LLM calls</text>

  <!-- NO path (bottom) -->
  <text x="214" y="147" font-size="9" fill="#febc2e" text-anchor="middle">NO</text>
  <line x1="214" y1="126" x2="214" y2="158" stroke="#febc2e" stroke-width="1.5"/>
  <line x1="214" y1="158" x2="380" y2="158" stroke="#febc2e" stroke-width="1.5" marker-end="url(#arrY)"/>

  <!-- LLM call box -->
  <rect x="380" y="136" width="120" height="44" rx="9" fill="#2a1a0a" stroke="#febc2e" stroke-width="1.5"/>
  <text x="440" y="155" font-size="10" fill="#febc2e" text-anchor="middle" font-weight="600">LLM call</text>
  <text x="440" y="170" font-size="9"  fill="#b88a30" text-anchor="middle">JSON-only output</text>

  <!-- Both paths merge to validate -->
  <line x1="500" y1="50"  x2="560" y2="50"  stroke="#28c840" stroke-width="1.5"/>
  <line x1="560" y1="50"  x2="560" y2="100" stroke="#28c840" stroke-width="1.5"/>

  <line x1="500" y1="158" x2="560" y2="158" stroke="#febc2e" stroke-width="1.5"/>
  <line x1="560" y1="158" x2="560" y2="100" stroke="#febc2e" stroke-width="1.5"/>

  <line x1="560" y1="100" x2="598" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Validate -->
  <rect x="598" y="74" width="100" height="52" rx="10" fill="#1a2d4a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="648" y="97"  font-size="11" fill="#fff"     text-anchor="middle" font-weight="600">Validate</text>
  <text x="648" y="113" font-size="9"  fill="#80b8d8"  text-anchor="middle">STEP_SCHEMA</text>

  <!-- Arrow 3→4 -->
  <line x1="698" y1="100" x2="728" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Execute -->
  <rect x="728" y="74" width="78" height="52" rx="10" fill="#0a2a1a" stroke="#28c840" stroke-width="2"/>
  <text x="767" y="97"  font-size="11" fill="#28c840" text-anchor="middle" font-weight="700">Execute</text>
  <text x="767" y="113" font-size="9"  fill="#4aaa6a"  text-anchor="middle">steps run</text>

  <!-- Title -->
  <text x="410" y="192" font-size="10" fill="#3a5a7a" text-anchor="middle">Task Planner — intent to execution flow</text>
</svg>
